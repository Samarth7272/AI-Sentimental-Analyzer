<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>AI Sentiment Analyzer</title>
</head>

<body>
    <div class="container mt-5">

<h1>AI Sentiment Analyzer</h1>

<textarea
id="text"
rows="6"
cols="50">
</textarea>

<br><br>

<button onclick="analyze()">
Analyze
</button>

 <h2 id="result"></h2>
<h3 id="score"></h3>
 <h2>Upload CSV File</h2>

 <form action="/upload_csv" method="POST" enctype="multipart/form-data">
         <input type="file" name="file" accept=".csv">
     <button type="submit">Upload CSV</button>
 </form>
  <h2>Sentiment Report</h2>

 <img src="{{ url_for('static', filename='charts/sentiment_chart.png') }}"
       width="500"
       alt="Sentiment Chart">
</div>
<script>
async function analyze() {

    let text = document.getElementById("text").value;

    let response = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text
        })
    });

    let data = await response.json();

 document.getElementById("result").innerHTML =
"Sentiment: " +
data.sentiment.charAt(0).toUpperCase() +
data.sentiment.slice(1);

document.getElementById("score").innerHTML =
"Score: " + data.score.toFixed(4);
}
</script>

</body>
</html>
